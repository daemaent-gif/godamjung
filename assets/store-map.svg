<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 640" role="img" aria-labelledby="title desc">
  <title id="title">고담정 수도권 지점 현황 지도</title>
  <desc id="desc">서울 18개, 경기 34개 지점 분포를 보여주는 목업 지도 이미지</desc>
  <defs>
    <radialGradient id="glow" cx="50%" cy="44%" r="70%">
      <stop offset="0%" stop-color="#4b403a"/>
      <stop offset="56%" stop-color="#343133"/>
      <stop offset="100%" stop-color="#28272a"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <filter id="pinGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="900" height="640" rx="0" fill="#2d1d15"/>
  <rect x="42" y="42" width="816" height="556" rx="10" fill="url(#glow)"/>

